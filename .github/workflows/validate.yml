name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run enhancer checks
        run: python scripts/check.py --verbose

      - name: Run validator tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build package artifacts
        run: |
          python -m pip install build
          python -m build

      - name: Smoke installed wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/codex-enhancer list-packs
          .venv-smoke/bin/codex-enhancer init tests/_tmp/ci-wheel-smoke --new
          .venv-smoke/bin/codex-enhancer init tests/_tmp/ci-wheel-smoke-full --new --with-spec-kit --utility-harness
