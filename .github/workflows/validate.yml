name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run enhancer checks
        run: python scripts/check.py --verbose

      - name: Run validator tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build package artifacts
        run: |
          python -m pip install build
          python -m build

      - name: Smoke installed wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter '*.whl' | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel artifact found in dist."
          }
          python -m venv .venv-smoke
          $python = if ($IsWindows) { ".venv-smoke\Scripts\python.exe" } else { ".venv-smoke/bin/python" }
          $codex = if ($IsWindows) { ".venv-smoke\Scripts\codex-enhancer.exe" } else { ".venv-smoke/bin/codex-enhancer" }
          & $python -m pip install $wheel.FullName
          & $codex list-packs
          & $codex init tests/_tmp/ci-wheel-smoke --new
          & $codex init tests/_tmp/ci-wheel-smoke-full --new --with-spec-kit --utility-harness
